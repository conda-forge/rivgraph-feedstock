{% set name = "rivgraph" %}
{% set version = "1.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/veinsoftheearth/rivgraph/archive/v{{ version }}.tar.gz
  sha256: 9d0f9aedd6f09d77f91eb50b3c02039b43010997a41aa6adf92ead5ba0497d46
  
build:
  noarch: python
  number: 4
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - setuptools >=64
    - python {{ python_min }}

  run:
    - python >={{ python_min }}
    - numpy >=1.26,<2
    - scipy >=1.11,<1.14
    - pandas >=2.2,<2.3
    - matplotlib-base >=3.8,<3.11
    - networkx >=2.8,<3.3
    - scikit-image >=0.22,<0.25
    - shapely >=2.1,<2.2
    - geopandas >=1.1,<1.2
    - pyproj >=3.6,<3.8
    - rasterio >=1.4,<1.5
    - pyogrio >=0.11.1,<0.13
    - contextily >=1.6,<2
    - pillow
    - pyyaml
    - loguru
    - fastdtw

test:
  requires:
    - python {{ python_min }}
  imports:
    - rivgraph

about:
  home: https://github.com/VeinsOfTheEarth/RivGraph
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: "Package to convert a binary mask of a channel network into a directed, weighted graph"
  description: |
    RivGraph extracts and quantifies graphical representations
    of river and delta channel networks from binary masks.
  doc_url: https://veinsoftheearth.github.io/RivGraph
  dev_url: https://github.com/VeinsOfTheEarth/RivGraph

extra:
  recipe-maintainers:
    - jsta
    - jonschwenk
    - elbeejay